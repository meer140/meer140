<!DOCTYPE html>
<html>
<head>
  <title>GitHub Profile B/W Encoder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 900px;
      width: 100%;
    }
    
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }
    
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      justify-content: center;
    }
    
    input {
      padding: 12px 20px;
      font-size: 16px;
      border: 2px solid #667eea;
      border-radius: 8px;
      flex: 1;
      max-width: 300px;
      transition: border-color 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #764ba2;
    }
    
    button {
      padding: 12px 30px;
      font-size: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .output-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-top: 30px;
    }
    
    .section {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
      border-left: 4px solid #667eea;
    }
    
    .section h2 {
      font-size: 18px;
      color: #333;
      margin-bottom: 15px;
    }
    
    #original-img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin-bottom: 15px;
      border: 2px solid #ddd;
    }
    
    #bw-canvas {
      border: 2px solid #ddd;
      border-radius: 8px;
      max-width: 100%;
      height: auto;
      display: block;
      background: #f0f0f0;
    }
    
    #ascii {
      font-family: 'Courier New', monospace;
      font-size: 6px;
      line-height: 6px;
      letter-spacing: -1px;
      overflow-x: auto;
      background: #1e1e1e;
      color: #00ff00;
      padding: 15px;
      border-radius: 8px;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre;
    }
    
    .pixel-array {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #333;
      background: #f0f0f0;
      padding: 15px;
      border-radius: 8px;
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #ddd;
    }
    
    .error {
      background: #fee;
      color: #c33;
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #c33;
      margin-top: 20px;
    }
    
    .success {
      background: #efe;
      color: #3c3;
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #3c3;
      margin-top: 20px;
    }
    
    .copy-btn {
      padding: 8px 15px;
      font-size: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
    
    .copy-btn:hover {
      background: #764ba2;
    }
    
    .size-control {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
      justify-content: center;
    }
    
    .size-control label {
      font-weight: bold;
      color: #333;
    }
    
    .size-control select {
      padding: 8px 15px;
      font-size: 14px;
      border: 2px solid #667eea;
      border-radius: 5px;
      cursor: pointer;
    }
    
    .loading {
      text-align: center;
      color: #667eea;
      font-weight: bold;
      padding: 15px;
    }
    
    @media (max-width: 768px) {
      .output-section {
        grid-template-columns: 1fr;
      }
      
      .container {
        padding: 20px;
      }
      
      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 GitHub Profile Image Encoder</h1>
    
    <div class="input-group">
      <input id="username" type="text" placeholder="Enter GitHub username (e.g., torvalds)" value="torvalds" />
      <button id="encodeBtn" onclick="processImage()">Encode</button>
    </div>
    
    <div class="size-control">
      <label for="size">Image Size:</label>
      <select id="size">
        <option value="32">32x32</option>
        <option value="64" selected>64x64</option>
        <option value="128">128x128</option>
        <option value="256">256x256</option>
      </select>
    </div>
    
    <div id="message"></div>
    
    <div class="output-section" id="output" style="display: none;">
      <div class="section">
        <h2>📷 Original & B/W Canvas</h2>
        <img id="original-img" alt="Original profile" crossorigin="anonymous" />
        <canvas id="bw-canvas"></canvas>
      </div>
      
      <div class="section">
        <h2>🎨 ASCII Art Representation</h2>
        <pre id="ascii"></pre>
        <button class="copy-btn" onclick="copyAscii()">Copy ASCII</button>
      </div>
    </div>
    
    <div class="section" id="arraySection" style="display: none; margin-top: 30px;">
      <h2>📊 2D Pixel Array (Binary)</h2>
      <div id="pixelArray" class="pixel-array"></div>
      <button class="copy-btn" onclick="copyPixelArray()">Copy Array</button>
    </div>
  </div>

  <script>
    let binaryArray = [];
    let asciiArt = '';
    let currentImageBlob = null;
    
    // Enhanced fetch with better error handling for CORS
    async function fetchWithTimeout(url, timeout = 10000) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);
      
      try {
        const response = await fetch(url, {
          signal: controller.signal,
          headers: {
            'Accept': '*/*',
            'User-Agent': 'GitHub-Profile-Encoder'
          }
        });
        clearTimeout(timeoutId);
        return response;
      } catch (e) {
        clearTimeout(timeoutId);
        throw e;
      }
    }
    
    async function processImage() {
      const username = document.getElementById('username').value.trim();
      const size = document.getElementById('size').value;
      const messageDiv = document.getElementById('message');
      const encodeBtn = document.getElementById('encodeBtn');
      
      if (!username) {
        messageDiv.innerHTML = '<div class="error">❌ Please enter a GitHub username</div>';
        return;
      }
      
      messageDiv.innerHTML = '<div class="loading">⏳ Loading image...</div>';
      encodeBtn.disabled = true;
      
      try {
        // Fetch user data from GitHub API
        const apiUrl = `https://api.github.com/users/${username}`;
        
        const response = await fetchWithTimeout(apiUrl);
        
        if (!response.ok) {
          if (response.status === 404) {
            throw new Error('GitHub user not found');
          } else if (response.status === 403) {
            throw new Error('API rate limit exceeded. Please try again later.');
          } else {
            throw new Error(`GitHub API error (${response.status})`);
          }
        }
        
        const userData = await response.json();
        const avatarUrl = userData.avatar_url;
        
        if (!avatarUrl) {
          throw new Error('User has no avatar');
        }
        
        // Fetch avatar with size parameter
        const imageUrl = `${avatarUrl}&s=${size}&t=${Date.now()}`;
        
        const imgResponse = await fetchWithTimeout(imageUrl);
        
        if (!imgResponse.ok) {
          throw new Error(`Failed to load avatar image (${imgResponse.status})`);
        }
        
        const blob = await imgResponse.blob();
        const url = URL.createObjectURL(blob);
        currentImageBlob = blob;
        
        // Create image object with CORS handling
        const img = new Image();
        img.crossOrigin = "anonymous";
        
        img.onload = function() {
          try {
            const canvas = document.getElementById('bw-canvas');
            canvas.width = size;
            canvas.height = size;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, size, size);
            
            // Display original image
            const originalImg = document.getElementById('original-img');
            originalImg.src = url;
            originalImg.crossOrigin = "anonymous";
            
            const imgData = ctx.getImageData(0, 0, size, size);
            const data = imgData.data;
            
            binaryArray = [];
            asciiArt = '';
            
            // Process image data
            for (let y = 0; y < size; y++) {
              let row = [];
              for (let x = 0; x < size; x++) {
                let idx = (y * size + x) * 4;
                let r = data[idx];
                let g = data[idx + 1];
                let b = data[idx + 2];
                
                // Convert to grayscale using standard luminosity formula
                let gray = 0.299 * r + 0.587 * g + 0.114 * b;
                
                // Threshold to binary (1 = white, 0 = black)
                let bw = gray > 128 ? 1 : 0;
                row.push(bw);
                
                // ASCII art: space for white, █ for black
                asciiArt += bw ? ' ' : '█';
              }
              binaryArray.push(row);
              asciiArt += '\n';
            }
            
            // Display results
            document.getElementById('ascii').textContent = asciiArt;
            displayPixelArray();
            document.getElementById('output').style.display = 'grid';
            document.getElementById('arraySection').style.display = 'block';
            
            messageDiv.innerHTML = `<div class="success">✅ Successfully encoded <strong>${userData.login}</strong>'s profile image (${size}x${size})</div>`;
            encodeBtn.disabled = false;
            
            // Clean up blob URL
            URL.revokeObjectURL(url);
          } catch (e) {
            messageDiv.innerHTML = `<div class="error">❌ Error processing image: ${e.message}</div>`;
            encodeBtn.disabled = false;
          }
        };
        
        img.onerror = () => {
          messageDiv.innerHTML = `<div class="error">❌ Failed to load image. Try running this file through a web server (not locally) or use a different username.</div>`;
          encodeBtn.disabled = false;
        };
        
        img.src = url;
      } catch (e) {
        let errorMsg = e.message;
        if (e.name === 'AbortError') {
          errorMsg = 'Request timed out. Check your internet connection.';
        }
        messageDiv.innerHTML = `<div class="error">❌ Error: ${errorMsg}<br/><small>💡 Tip: If opening as a local file (file://), serve it with a web server instead:<br/>Python: <code>python -m http.server 8000</code><br/>Node: <code>npx http-server</code></small></div>`;
        encodeBtn.disabled = false;
      }
    }
    
    function displayPixelArray() {
      const size = binaryArray.length;
      let arrayStr = `[\n`;
      
      for (let i = 0; i < Math.min(size, 20); i++) {
        arrayStr += `  [${binaryArray[i].join(', ')}],\n`;
      }
      
      if (size > 20) {
        arrayStr += `  ... (${size - 20} more rows)\n`;
      }
      
      arrayStr += `]`;
      
      document.getElementById('pixelArray').textContent = arrayStr;
    }
    
    function copyAscii() {
      navigator.clipboard.writeText(asciiArt).then(() => {
        alert('✅ ASCII art copied to clipboard!');
      }).catch(() => {
        alert('❌ Failed to copy to clipboard');
      });
    }
    
    function copyPixelArray() {
      const arrayStr = JSON.stringify(binaryArray);
      navigator.clipboard.writeText(arrayStr).then(() => {
        alert('✅ Pixel array copied to clipboard!');
      }).catch(() => {
        alert('❌ Failed to copy to clipboard');
      });
    }
    
    // Load default on page load
    window.addEventListener('load', () => {
      processImage();
    });
  </script>
</body>
</html>
